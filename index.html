<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>For You</title>
    <style>
        /* Menghilangkan margin dan membuat iframe memenuhi layar */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: black;
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }
        /* Tombol Start karena Browser modern melarang musik nyala otomatis tanpa klik */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            cursor: pointer;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startEverything()">
        <h1>Klik untuk Mulai</h1>
    </div>

    <audio id="myAudio" loop>
        <source src="musik.mp3" type="audio/mpeg">
    </audio>

    <iframe src="tanya.html" id="kontenHalaman"></iframe>

    <script>
        function startEverything() {
            // Putar musik
            document.getElementById('myAudio').play();
            // Hilangkan layar klik
            document.getElementById('overlay').style.display = 'none';
        }
    </script>

</body>
</html>
